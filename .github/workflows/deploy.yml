name: Deploy to GitHub Pages

# Build & publish the Vite bundle to GitHub Pages whenever `main` is updated.
# Also available as a manual run from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# The GITHUB_TOKEN needs `pages: write` and `id-token: write` for the
# official `deploy-pages` action to work.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel stale runs so the latest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # Tests and typecheck are best-effort: the repo currently has two
      # pre-existing failures in core/layout and core/step which are unrelated
      # to the UI. Don't block deploys on them — flip `continue-on-error` to
      # `false` once those are fixed.
      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
